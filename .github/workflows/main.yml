name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List Project Files
        run: ls -la

      - name: Verify HTML Exists
        run: |
          if [ ! -f index.html ]; then
            echo "index.html not found!"
            exit 1
          fi

      - name: Verify CSS Exists
        run: |
          if [ ! -f index.css ]; then
            echo "index.css not found!"
            exit 1
          fi

      - name: Verify JS Exists
        run: |
          if [ ! -f index.js ]; then
            echo "index.js not found!"
            exit 1
          fi

      - name: CI Passed
        run: echo "All checks passed successfully!"
